version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guardians-api
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/guardians
      - JWT_SECRET=supersecret123
    depends_on:
      - mongodb
    command: npm run start:dev

  mongodb:
    image: mongo:6
    container_name: guardians-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
